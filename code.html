<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logistic Map — Population Over Time</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #e9eef3;
      color: #222;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    nav {
      margin-bottom: 20px;
    }

    nav a {
      margin-right: 20px;
      text-decoration: none;
      color: #1a1a1a;
      font-weight: bold;
      font-size: 18px;
    }

    .card {
      background: white;
      border: 2px solid #b8c4d0;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 14px 35px rgba(0, 0, 0, 0.18);
    }

    h1 { margin-top: 0; font-size: 24px; }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
      background: #f8f8f8;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px;
    }

    label { display: block; font-weight: 600; margin-bottom: 6px; }

    input[type="range"], input[type="number"] { width: 100%; }

    .row {
      display: grid;
      grid-template-columns: 1fr 88px;
      gap: 8px;
      align-items: center;
    }

    #calculator {
      width: 100%;
      height: 70vh;
      min-height: 560px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: white;
    }

    .small { color: #555; font-size: 14px; }

    .footer { margin-top: 10px; color: #555; font-size: 14px; }

    code { background: #f0f0f0; padding: 2px 5px; border-radius: 4px; }
  </style>

  <script src="https://www.desmos.com/api/v1.11/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
</head>

<body>
  <div class="wrap">

    <nav>
      <a href="index.html">Home</a>
      <a href="code.html">Code</a>
    </nav>

    <div class="card">
      <h1>Population evolution over time (logistic map)</h1>

      <p class="small">
        This plots the discrete logistic map <code>Pₙ₊₁ = rPₙ(1 - Pₙ)</code>
      </p>

      <div class="controls">
        <div>
          <label>Growth parameter r</label>
          <div class="row">
            <input id="rRange" type="range" min="0" max="4" step="0.001" value="3.2" />
            <input id="rNum" type="number" min="0" max="4" step="0.001" value="3.2" />
          </div>
        </div>

        <div>
          <label>Initial population P₀</label>
          <div class="row">
            <input id="p0Range" type="range" min="0" max="1" step="0.001" value="0.2" />
            <input id="p0Num" type="number" min="0" max="1" step="0.001" value="0.2" />
          </div>
        </div>

        <div>
          <label>Iterations</label>
          <div class="row">
            <input id="nRange" type="range" min="5" max="300" value="80" />
            <input id="nNum" type="number" min="5" max="300" value="80" />
          </div>
        </div>
      </div>

      <div id="calculator"></div>
    </div>

  </div>

  <script>
    const elt = document.getElementById('calculator');
    const calculator = Desmos.GraphingCalculator(elt);

    const controls = {
      rRange: document.getElementById('rRange'),
      rNum: document.getElementById('rNum'),
      p0Range: document.getElementById('p0Range'),
      p0Num: document.getElementById('p0Num'),
      nRange: document.getElementById('nRange'),
      nNum: document.getElementById('nNum')
    };

    function sync(a, b) {
      a.oninput = () => { b.value = a.value; update(); };
      b.oninput = () => { a.value = b.value; update(); };
    }

    sync(controls.rRange, controls.rNum);
    sync(controls.p0Range, controls.p0Num);
    sync(controls.nRange, controls.nNum);

    function update() {
      const r = parseFloat(controls.rNum.value);
      const p0 = parseFloat(controls.p0Num.value);
      const steps = parseInt(controls.nNum.value);

      let p = p0;
      let xs = [], ys = [];

      for (let i = 0; i <= steps; i++) {
        xs.push(i);
        ys.push(p);
        p = r * p * (1 - p);
      }

      calculator.setBlank();
      calculator.setExpression({
        id: 'table',
        type: 'table',
        columns: [
          { latex: 'n', values: xs },
          { latex: 'P_n', values: ys, points: true, lines: true }
        ]
      });
    }

    update();
  </script>
</body>
</html>
